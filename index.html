<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutoKosten">
<title>AutoKosten Rob</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --bg2: #161b27; --bg3: #1a2133;
  --border: #1e2d3d; --border2: #2a3a50;
  --txt: #e2e8f0; --txt2: #94a3b8; --txt3: #475569;
  --blue: #3b82f6; --green: #10b981; --orange: #f97316;
  --red: #ef4444; --yellow: #f59e0b; --purple: #8b5cf6;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px}
body{display:flex;flex-direction:column}
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + var(--safe-bottom))}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + var(--safe-bottom));background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--txt3);cursor:pointer;font-family:inherit;font-size:10px;padding:8px 4px;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-icon{font-size:20px;line-height:1}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:11px 18px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}
.btn-danger{background:#7f1d1d;color:#fca5a5}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label.lbl{font-size:12px;color:var(--txt3);font-weight:500}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:inherit;font-size:14px;transition:border .15s;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--blue);outline:none}
.inp option{background:var(--bg2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* HEADER */
.page-header{padding:16px 16px 8px;background:linear-gradient(180deg,#0f172a,var(--bg));position:sticky;top:0;z-index:50}
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--txt)}
.page-sub{font-size:12px;color:var(--txt3);margin-top:2px}

/* TAGS & BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#1e3a5f;color:#60a5fa}
.badge-green{background:#064e3b;color:#34d399}
.badge-red{background:#7f1d1d;color:#fca5a5}
.badge-orange{background:#431407;color:#fb923c}
.badge-yellow{background:#451a03;color:#fbbf24}
.kenteken{background:#fbbf24;color:#1c1917;padding:2px 8px;border-radius:4px;font-weight:700;font-size:12px;letter-spacing:1px}

/* ROW ITEMS */
.row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.row-info{flex:1;min-width:0;margin:0 10px}
.row-title{font-size:14px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.row-amount{font-size:15px;font-weight:700;color:var(--txt);flex-shrink:0}

/* LAND SELECTOR */
.land-btn{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:var(--bg);color:var(--txt2);cursor:pointer;font-family:inherit;font-size:13px;text-align:center;transition:all .15s}
.land-btn.sel{border-color:var(--blue);background:#1e3a5f;color:#60a5fa;font-weight:600}

/* VOORDEEL CARD */
.voordeel-card{border-radius:12px;padding:14px;margin-top:12px}
.voordeel-pos{background:linear-gradient(135deg,#064e3b,#065f46);border:1px solid #10b981}
.voordeel-neg{background:linear-gradient(135deg,#450a0a,#7f1d1d);border:1px solid #ef4444}
.voordeel-neutr{background:var(--bg3);border:1px solid var(--border)}

/* APK */
.apk-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:8px}
.apk-fill{height:100%;border-radius:3px;transition:width .5s}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .15s}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--txt);margin-bottom:16px}

/* PAGE ANIM */
.page{animation:pageIn .2s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION TITLES */
.section-title{font-size:12px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

/* SAVINGS ROW */
.sav-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.sav-label{color:var(--txt2)}
.sav-val{font-weight:600;color:var(--txt)}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty-icon{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav">
  <button class="nav-btn active" onclick="nav('dashboard')" id="nb-dashboard"><span class="nav-icon">📊</span>Dashboard</button>
  <button class="nav-btn" onclick="nav('tanken')" id="nb-tanken"><span class="nav-icon">⛽</span>Tanken</button>
  <button class="nav-btn" onclick="nav('apk')" id="nb-apk"><span class="nav-icon">✅</span>APK</button>
  <button class="nav-btn" onclick="nav('kosten')" id="nb-kosten"><span class="nav-icon">💶</span>Kosten</button>
  <button class="nav-btn" onclick="nav('instellingen')" id="nb-instellingen"><span class="nav-icon">⚙️</span>Instellingen</button>
</nav>
<button id="fab" onclick="fabKlik()" style="position:fixed;right:18px;bottom:calc(70px + env(safe-area-inset-bottom,0px) + 12px);width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;color:white;font-size:26px;line-height:1;cursor:pointer;box-shadow:0 4px 18px rgba(37,99,235,.5);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .15s" ontouchstart="this.style.transform='scale(.92)'" ontouchend="this.style.transform='scale(1)'">+</button>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const VOERTUIGEN = [
  {id:'peugeot',naam:'Peugeot 406',kenteken:'03-FS-HR',jaar:2000,type:'Automaat',kleur:'#3b82f6'},
  {id:'ford',   naam:'Ford Focus', kenteken:'91-PF-BL',jaar:null, type:'',        kleur:'#10b981'},
];
const CATEGORIEEN = [
  {naam:'Onderhoud',kleur:'#3b82f6',emoji:'🔧'},
  {naam:'Verzekering',kleur:'#8b5cf6',emoji:'🛡️'},
  {naam:'Wegenbelasting',kleur:'#10b981',emoji:'📋'},
  {naam:'APK / Keuring',kleur:'#f59e0b',emoji:'✅'},
  {naam:'Banden',kleur:'#ec4899',emoji:'🔄'},
  {naam:'Parkeren',kleur:'#06b6d4',emoji:'🅿️'},
  {naam:'Boetes',kleur:'#ef4444',emoji:'🚨'},
  {naam:'Reparatie',kleur:'#a78bfa',emoji:'🛠️'},
  {naam:'Overig',kleur:'#6b7280',emoji:'💼'},
];
const LANDEN = [
  {id:'nl',naam:'Nederland',vlag:'🇳🇱',kleur:'#f97316'},
  {id:'de',naam:'Duitsland',vlag:'🇩🇪',kleur:'#facc15'},
  {id:'be',naam:'België',   vlag:'🇧🇪',kleur:'#ef4444'},
];

const defaultData = {
  prijzen:    {nl:1.89, de:1.62, be:1.68},
  kostenPerKm:0.25,
  apk: {peugeot:'', ford:''},
  tankbeurten:[],
  kosten:[],
};

let state = JSON.parse(localStorage.getItem('autokosten') || 'null') || defaultData;
let currentTab = 'dashboard';
let modal = null; // {type, data}

function save(){localStorage.setItem('autokosten', JSON.stringify(state));}
function fmt(n){return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(n||0);}
function fmtN(n,dec=2){return new Intl.NumberFormat('nl-NL',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n||0);}
function today(){return new Date().toISOString().slice(0,10);}
function getVt(id){return VOERTUIGEN.find(v=>v.id===id);}
function getCat(naam){return CATEGORIEEN.find(c=>c.naam===naam)||{emoji:'💼',kleur:'#6b7280'};}
function getLand(id){return LANDEN.find(l=>l.id===id)||LANDEN[0];}
function apkDagen(dateStr){
  if(!dateStr)return null;
  const diff = new Date(dateStr) - new Date(today());
  return Math.ceil(diff/86400000);
}
function apkKleur(dagen){
  if(dagen===null)return '#475569';
  if(dagen<0)return '#ef4444';
  if(dagen<30)return '#ef4444';
  if(dagen<60)return '#f59e0b';
  return '#10b981';
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function nav(tab){
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nb-'+tab)?.classList.add('active');
  render();
}

// ─── VOORDEEL BEREKENING ─────────────────────────────────────────────────────
function berekenVoordeel(liters, landId, prijsBetaald, ritKm){
  const nlPrijs = state.prijzen.nl;
  const nlKosten = liters * nlPrijs;
  const betaaldKosten = liters * prijsBetaald;
  const brutoBesparing = nlKosten - betaaldKosten;
  const ritKosten = (ritKm||0) * state.kostenPerKm;
  const nettoBesparing = brutoBesparing - ritKosten;
  return {nlKosten, betaaldKosten, brutoBesparing, ritKosten, nettoBesparing};
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  if(modal){renderModal(); return;}
  const pages = {dashboard:renderDashboard, tanken:renderTanken, apk:renderAPK, kosten:renderKosten, instellingen:renderInstellingen};
  app.innerHTML = (pages[currentTab]||renderDashboard)();
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard(){
  const jaar = new Date().getFullYear().toString();
  const totalen = {};
  VOERTUIGEN.forEach(v=>{
    const tk = state.tankbeurten.filter(t=>t.voertuig===v.id&&t.datum.startsWith(jaar));
    const ko = state.kosten.filter(k=>k.voertuig===v.id&&k.datum.startsWith(jaar));
    const tankTotaal = tk.reduce((s,t)=>s+t.liters*t.prijsPerLiter,0);
    const kostTotaal = ko.reduce((s,k)=>s+k.bedrag,0);
    totalen[v.id] = tankTotaal + kostTotaal;
  });

  const recentTank = [...state.tankbeurten].sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,3);
  const recentKost = [...state.kosten].sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,2);
  const alles = [...state.tankbeurten.map(t=>({...t,_type:'tank'})),...state.kosten.map(k=>({...k,_type:'kost'}))].sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,5);

  const apkItems = VOERTUIGEN.map(v=>{
    const d = state.apk[v.id];
    const dagen = apkDagen(d);
    return {v,d,dagen};
  }).filter(x=>x.d||(x.d===''&&true));

  let html = `<div class="page">
  <div class="page-header">
    <div class="page-title">🚗 AutoKosten</div>
    <div class="page-sub">Rob — ${jaar}</div>
  </div>
  <div style="padding:0 14px">`;

  // Auto totaal cards
  html += `<div class="grid2" style="margin-bottom:14px">`;
  VOERTUIGEN.forEach(v=>{
    const dagen = apkDagen(state.apk[v.id]);
    const apkWarn = dagen!==null && dagen<60;
    html += `<div class="card" style="border-left:3px solid ${v.kleur};position:relative">
      <div style="font-size:11px;color:var(--txt3)">${v.jaar?v.jaar+' · ':''}<span class="kenteken">${v.kenteken}</span></div>
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin:6px 0 4px">${v.naam}</div>
      <div style="font-size:20px;font-weight:700;color:${v.kleur}">${fmt(totalen[v.id])}</div>
      ${apkWarn?`<div style="font-size:10px;color:${apkKleur(dagen)};margin-top:4px">⚠️ APK: ${dagen<0?'verlopen!':dagen+' dagen'}</div>`:''}
    </div>`;
  });
  html += `</div>`;

  // APK alerts
  const apkAlerts = VOERTUIGEN.filter(v=>{
    const d = apkDagen(state.apk[v.id]);
    return d!==null && d<60;
  });
  if(apkAlerts.length>0){
    apkAlerts.forEach(v=>{
      const d = apkDagen(state.apk[v.id]);
      const kl = apkKleur(d);
      html += `<div style="background:${kl}22;border:1px solid ${kl}44;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">⚠️</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:${kl}">${v.naam} — APK ${d<0?'VERLOPEN':'bijna verlopen'}</div>
          <div style="font-size:11px;color:var(--txt3)">${d<0?Math.abs(d)+' dagen geleden verlopen':d+' dagen resterend'} · Verloopt ${state.apk[v.id]}</div>
        </div>
      </div>`;
    });
  }

  // Recente activiteit
  if(alles.length>0){
    html += `<div class="section-title" style="margin-top:4px">Recente activiteit</div>
    <div class="card" style="padding:4px 12px">`;
    alles.forEach(item=>{
      if(item._type==='tank'){
        const land = getLand(item.land);
        const vt = getVt(item.voertuig);
        const v = berekenVoordeel(item.liters, item.land, item.prijsPerLiter, item.ritKm);
        const bspr = v.nettoBesparing;
        html += `<div class="row">
          <div class="row-icon" style="background:${land.kleur}22;font-size:20px">${land.vlag}</div>
          <div class="row-info">
            <div class="row-title">Getankt — ${land.naam}</div>
            <div class="row-sub">${item.datum} · ${fmtN(item.liters,1)}L · <span style="color:${vt?.kleur}">${vt?.naam}</span></div>
          </div>
          <div style="text-align:right">
            <div class="row-amount">${fmt(item.liters*item.prijsPerLiter)}</div>
            ${item.land!=='nl'?`<div style="font-size:10px;color:${bspr>0?'#34d399':'#f87171'}">${bspr>0?'+ '+fmt(bspr):fmt(bspr)}</div>`:''}
          </div>
        </div>`;
      } else {
        const cat = getCat(item.categorie);
        const vt = getVt(item.voertuig);
        html += `<div class="row">
          <div class="row-icon" style="background:${cat.kleur}22">${cat.emoji}</div>
          <div class="row-info">
            <div class="row-title">${item.omschrijving||item.categorie}</div>
            <div class="row-sub">${item.datum} · <span style="color:${vt?.kleur}">${vt?.naam}</span></div>
          </div>
          <div class="row-amount">${fmt(item.bedrag)}</div>
        </div>`;
      }
    });
    html += `</div>`;
  } else {
    html += `<div class="empty"><div class="empty-icon">🚗</div><div>Nog geen registraties</div><div style="font-size:12px;margin-top:6px">Begin met een tankbeurt of kost toevoegen</div></div>`;
  }

  html += `</div></div>`;
  return html;
}

// ─── TANKEN ──────────────────────────────────────────────────────────────────
function renderTanken(){
  const tankbeurten = [...state.tankbeurten].sort((a,b)=>b.datum.localeCompare(a.datum));

  let html = `<div class="page">
  <div class="page-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="page-title">⛽ Tankbeurten</div><div class="page-sub">${tankbeurten.length} registraties</div></div>
      <button class="btn btn-primary btn-sm" onclick="openModal('addTank',{})" style="flex-shrink:0;margin-left:10px">+ Toevoegen</button>
    </div>
  </div>
  <div style="padding:0 14px">`;

  // Stat cards per auto
  VOERTUIGEN.forEach(v=>{
    const rijen = tankbeurten.filter(t=>t.voertuig===v.id);
    if(rijen.length===0)return;
    const totLiters = rijen.reduce((s,t)=>s+t.liters,0);
    const totKosten = rijen.reduce((s,t)=>s+t.liters*t.prijsPerLiter,0);
    const buitenland = rijen.filter(t=>t.land!=='nl');
    const bespaard = buitenland.reduce((s,t)=>{
      const v2 = berekenVoordeel(t.liters,t.land,t.prijsPerLiter,t.ritKm);
      return s+v2.nettoBesparing;
    },0);
    html += `<div class="card-sm" style="border-left:3px solid ${v.kleur};margin-bottom:10px;display:flex;gap:0">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--txt3)">${v.naam}</div>
        <div style="font-size:18px;font-weight:700;color:${v.kleur};margin-top:2px">${fmtN(totLiters,0)}L</div>
        <div style="font-size:11px;color:var(--txt3)">${fmt(totKosten)} totaal</div>
      </div>
      <div style="width:1px;background:var(--border);margin:4px 12px"></div>
      <div style="flex:1;text-align:right">
        <div style="font-size:11px;color:var(--txt3)">Netto bespaard 🌍</div>
        <div style="font-size:18px;font-weight:700;color:${bespaard>=0?'#34d399':'#f87171'};margin-top:2px">${bespaard>=0?'+':''}${fmt(bespaard)}</div>
        <div style="font-size:11px;color:var(--txt3)">${buitenland.length}x buitenland</div>
      </div>
    </div>`;
  });

  if(tankbeurten.length===0){
    html += `<div class="empty"><div class="empty-icon">⛽</div><div>Nog geen tankbeurten</div></div>`;
  } else {
    html += `<div class="section-title" style="margin-top:4px">Alle tankbeurten</div>`;
    tankbeurten.forEach(t=>{
      const land = getLand(t.land);
      const vt = getVt(t.voertuig);
      const totaalBetaald = t.liters * t.prijsPerLiter;
      const isBuitenland = t.land !== 'nl';
      let voordeel = null;
      if(isBuitenland) voordeel = berekenVoordeel(t.liters, t.land, t.prijsPerLiter, t.ritKm);

      html += `<div class="card" style="margin-bottom:10px;border-left:3px solid ${land.kleur}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="display:flex;gap:10px;align-items:center">
            <span style="font-size:28px">${land.vlag}</span>
            <div>
              <div style="font-weight:600;color:var(--txt)">${land.naam}</div>
              <div style="font-size:12px;color:var(--txt3)">${t.datum} · <span style="color:${vt?.kleur}">${vt?.naam}</span></div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:700;color:var(--txt)">${fmt(totaalBetaald)}</div>

// ─── APK ─────────────────────────────────────────────────────────────────────
function renderAPK(){
  let html = `<div class="page">

  <div style="padding:0 14px">`;

  VOERTUIGEN.forEach(v=>{
    const dateStr = state.apk[v.id]||'';
    const dagen = apkDagen(dateStr);
    const kl = apkKleur(dagen);
    let statusTekst = 'Niet ingevuld';
    let pct = 0;
    if(dateStr){
      if(dagen<0) statusTekst = `${Math.abs(dagen)} dagen VERLOPEN`;
      else if(dagen===0) statusTekst = 'Verloopt VANDAAG!';
      else statusTekst = `Nog ${dagen} dagen geldig`;
      pct = Math.max(0,Math.min(100, dagen/365*100));
    }

    html += `<div class="card" style="margin-bottom:14px;border-left:3px solid ${v.kleur}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">

          <span class="kenteken">${v.kenteken}</span>
        </div>
        <div style="text-align:right">
          ${dateStr?`<div style="font-size:13px;color:var(--txt2)">Verloopt</div><div style="font-size:17px;font-weight:700;color:${kl}">${dateStr}</div>`:'<div style="color:var(--txt3);font-size:13px">Nog niet ingesteld</div>'}

      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:20px">${dagen===null?'❓':dagen<0?'🔴':dagen<30?'🟠':dagen<60?'🟡':'🟢'}</span>
        <span style="font-size:13px;font-weight:600;color:${kl}">${statusTekst}</span>
      </div>

      ${dateStr?`<div class="apk-bar"><div class="apk-fill" style="width:${pct}%;background:${kl}"></div></div><div style="font-size:10px;color:var(--txt3);margin-top:4px;text-align:right">${pct.toFixed(0)}% van jaar resterend</div>`:''}

      <button class="btn btn-secondary btn-full" style="margin-top:12px" onclick="openModal('editAPK',{id:'${v.id}'})">

      • APK aanvragen kan t/m de vervaldatum<br>
      • Bij zakken: reparatie melden binnen 4 weken<br>
      • Gemiddelde kosten APK: €25–€50
    </div>
  </div>`;

  html += `</div></div>`;
  return html;
}

// ─── KOSTEN ──────────────────────────────────────────────────────────────────
function renderKosten(){
  const kosten = [...state.kosten].sort((a,b)=>b.datum.localeCompare(a.datum));
  const totaal = kosten.reduce((s,k)=>s+k.bedrag,0);

  // Per categorie samenvatting
  const perCat = {};
  kosten.forEach(k=>{ perCat[k.categorie]=(perCat[k.categorie]||0)+k.bedrag; });

  let html = `<div class="page">
  <div class="page-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="page-title">💶 Kosten</div><div class="page-sub">${fmt(totaal)} totaal · ${kosten.length} posten</div></div>

    </div>
  </div>
  <div style="padding:0 14px">`;

  if(Object.keys(perCat).length>0){
    html += `<div class="section-title">Samenvatting per categorie</div>
    <div class="card" style="padding:8px 12px;margin-bottom:14px">`;
    Object.entries(perCat).sort((a,b)=>b[1]-a[1]).forEach(([naam,bedrag])=>{
      const cat = getCat(naam);
      const pct = totaal>0?(bedrag/totaal*100).toFixed(0):0;
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">${cat.emoji}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">

          </div>
          <div style="height:4px;background:var(--border);border-radius:2px">

        </div>
        <span style="font-size:11px;color:var(--txt3);width:30px;text-align:right">${pct}%</span>

  if(kosten.length===0){
    html += `<div class="empty"><div class="empty-icon">💶</div><div>Nog geen kosten</div></div>`;
  } else {
    html += `<div class="section-title">Alle kosten</div>`;

    kosten.forEach(k=>{
      const cat = getCat(k.categorie);
      const vt = getVt(k.voertuig);
      html += `<div class="card" style="margin-bottom:8px;display:flex;gap:10px;align-items:center">
        <div class="row-icon" style="background:${cat.kleur}22">${cat.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${k.omschrijving||k.categorie}</div>
          <div style="font-size:11px;color:var(--txt3);margin-top:2px">${k.datum} · <span style="color:${vt?.kleur}">${vt?.naam}</span></div>
          <div style="margin-top:4px"><span style="font-size:10px;background:${cat.kleur}22;color:${cat.kleur};padding:1px 7px;border-radius:10px">${k.categorie}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:15px;font-weight:700;color:var(--txt)">${fmt(k.bedrag)}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="btn btn-secondary btn-sm" onclick="openModal('editKost',${JSON.stringify({id:k.id})})">✏️</button>

// ─── MODALS ──────────────────────────────────────────────────────────────────
function openModal(type, data){
  modal = {type, data};
  renderModal();
}
function closeModal(){
  modal = null;
  render();
}

function renderModal(){
  const app = document.getElementById('app');
  // Keep page behind
  if(!document.getElementById('modal-overlay')){
    const ov = document.createElement('div');
    ov.id = 'modal-overlay';
    ov.className = 'modal-overlay';
    ov.onclick = e=>{ if(e.target===ov) closeModal(); };
    document.body.appendChild(ov);
  }
  const ov = document.getElementById('modal-overlay');
  ov.innerHTML = `<div class="modal">${getModalContent()}</div>`;
}

function removeModal(){
  const ov = document.getElementById('modal-overlay');
  if(ov) ov.remove();
}

// ─── VOORDEEL PREVIEW (live in modal) ────────────────────────────────────────
function selectLand(landId){
  document.getElementById('t-land').value = landId;
  document.querySelectorAll('.land-btn').forEach(b=>b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  // Update prijs placeholder
  const prijsInp = document.getElementById('t-prijs');
  if(prijsInp && !prijsInp.value){
    prijsInp.placeholder = fmtN(state.prijzen[landId]||1.80,3).replace(',','.');
  }
  updateVoordeelPreview();
}

function updateVoordeelPreview(){
  const landId = document.getElementById('t-land')?.value;
  const liters = parseFloat(document.getElementById('t-liters')?.value)||0;
  const prijs = parseFloat(document.getElementById('t-prijs')?.value)||0;
  const ritKm = parseFloat(document.getElementById('t-ritkm')?.value)||0;
  const prev = document.getElementById('voordeel-preview');
  if(!prev) return;

  if(landId==='nl'||!liters||!prijs){ prev.innerHTML=''; return; }

  const v = berekenVoordeel(liters, landId, prijs, ritKm);
  const pos = v.nettoBesparing > 0;
  const land = getLand(landId);

  prev.innerHTML = `<div class="${pos?'voordeel-pos':'voordeel-neg'} voordeel-card" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:${pos?'#34d399':'#f87171'};margin-bottom:8px">${pos?'✅ Voordelig':'❌ Nadelig'} t.o.v. Nederland</div>
    <div class="sav-row"><span class="sav-label">NL zou kosten</span><span class="sav-val">${fmt(v.nlKosten)}</span></div>
    <div class="sav-row"><span class="sav-label">Betaald in ${land.naam}</span><span class="sav-val">${fmt(v.betaaldKosten)}</span></div>
    <div class="sav-row"><span class="sav-label">Bruto besparing</span><span class="sav-val" style="color:${v.brutoBesparing>0?'#34d399':'#f87171'}">${fmt(v.brutoBesparing)}</span></div>
    ${ritKm?`<div class="sav-row"><span class="sav-label">Rijkosten (${ritKm} km)</span><span class="sav-val" style="color:#f87171">- ${fmt(v.ritKosten)}</span></div>`:''}
    <div style="height:1px;background:rgba(255,255,255,.1);margin:6px 0"></div>
    <div class="sav-row"><span class="sav-label" style="font-weight:700;color:var(--txt)">Netto voordeel</span><span class="sav-val" style="font-size:15px;color:${pos?'#34d399':'#f87171'}">${pos?'+':''}${fmt(v.nettoBesparing)}</span></div>
  </div>`;
}

// ─── OPSLAAN / VERWIJDEREN ───────────────────────────────────────────────────
function slaaTankOp(editId){
  const landId = document.getElementById('t-land').value;
  const liters = parseFloat(document.getElementById('t-liters').value);
  const prijsPerLiter = parseFloat(document.getElementById('t-prijs').value);
  if(!liters||!prijsPerLiter||isNaN(liters)||isNaN(prijsPerLiter)) return;
  const obj = {
    id: editId||Date.now().toString(),
    datum: document.getElementById('t-datum').value,
    voertuig: document.getElementById('t-voertuig').value,
    land: landId,
    liters, prijsPerLiter,
    kmStand: parseInt(document.getElementById('t-km').value)||null,
    ritKm: parseFloat(document.getElementById('t-ritkm').value)||null,
    notities: document.getElementById('t-notities').value,
  };
  if(editId){
    state.tankbeurten = state.tankbeurten.map(t=>t.id===editId?obj:t);
  } else {
    state.tankbeurten.push(obj);
  }
  save();
  removeModal();
  modal = null;
  nav('tanken');
}

function verwijderTank(id){
  if(!confirm('Tankbeurt verwijderen?'))return;
  state.tankbeurten = state.tankbeurten.filter(t=>t.id!==id);
  save(); render();
}

function slaaKostOp(editId){
  const bedrag = parseFloat(document.getElementById('k-bedrag').value);
  if(!bedrag||isNaN(bedrag)||bedrag<=0) return;
  const obj = {
    id: editId||Date.now().toString(),
    datum: document.getElementById('k-datum').value,
    voertuig: document.getElementById('k-voertuig').value,
    categorie: document.getElementById('k-categorie').value,
    bedrag,
    omschrijving: document.getElementById('k-omschrijving').value,
  };
  if(editId){
    state.kosten = state.kosten.map(k=>k.id===editId?obj:k);
  } else {
    state.kosten.push(obj);
  }
  save();
  removeModal();
  modal = null;
  nav('kosten');
}

function verwijderKost(id){
  if(!confirm('Kost verwijderen?'))return;
  state.kosten = state.kosten.filter(k=>k.id!==id);
  save(); render();
}

function slaaAPKOp(voertuigId){
  const d = document.getElementById('apk-datum').value;
  state.apk[voertuigId] = d;
  save();
  removeModal();
  modal = null;
  nav('apk');
}

function verwijderAPK(voertuigId){
  state.apk[voertuigId] = '';
  save();
  removeModal();
  modal = null;
  nav('apk');
}

function updatePrijs(landId, val){
  const n = parseFloat(val);
  if(!isNaN(n)&&n>0){ state.prijzen[landId]=n; save(); }
}

function updateKostenPerKm(val){
  const n = parseFloat(val);
  if(!isNaN(n)&&n>=0){ state.kostenPerKm=n; save(); }
}

function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `autokosten-export-${today()}.json`;
  a.click();
}

function resetData(){
  if(confirm('Weet je zeker dat je alle data wilt wissen?')){
    if(confirm('Laatste waarschuwing: alle tankbeurten en kosten worden verwijderd!')){
      state = {...defaultData};
      save(); render();
    }
  }
}


// ─── API SLEUTEL & PRIJZEN OPHALEN ───────────────────────────────────────────
function slaAPIKeyOp(){
  const inp = document.getElementById('api-key-inp');
  if(!inp) return;
  const val = inp.value.trim();
  if(!val){ alert('Voer een geldige API-sleutel in.'); return; }
  localStorage.setItem('anthropic_api_key', val);
  const status = document.getElementById('key-status');
  if(status){ status.textContent = '✓ API-sleutel opgeslagen'; status.style.color='#34d399'; }
}

function toggleKeyVisible(){
  const inp = document.getElementById('api-key-inp');
  if(!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function haalPrijzenOp(){
  const apiKey = localStorage.getItem('anthropic_api_key')||'';
  const btn = document.getElementById('fetch-btn');
  const status = document.getElementById('fetch-status');

  if(!apiKey){
    if(status){ status.textContent = '⚠️ Voer eerst een API-sleutel in en klik Opslaan.'; status.style.color='#f87171'; }
    return;
  }

  if(btn){ btn.disabled=true; btn.textContent='⏳ Ophalen...'; }
  if(status){ status.textContent = 'Even geduld...'; status.style.color='var(--txt3)'; }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        system: 'Geef uitsluitend een JSON-object terug. Geen uitleg, geen markdown, geen code blocks. Alleen de raw JSON.',
        messages: [{
          role: 'user',
          content: 'Wat zijn de huidige gemiddelde Euro95 benzineprijzen per liter (in euro) in Nederland, Duitsland en Belgie? Geef alleen JSON: {"nl": 2.29, "de": 1.95, "be": 1.85} met de meest recente prijzen die je kent. Gebruik een punt als decimaalscheiding.'
        }]
      })
    });

    if(!response.ok){
      const err = await response.json().catch(()=>({}));
      throw new Error(err?.error?.message || 'HTTP ' + response.status);
    }

    const data = await response.json();

    // Extract text
    let tekst = '';
    if(data.content){
      for(const block of data.content){
        if(block.type === 'text') tekst += block.text;
      }
    }
    tekst = tekst.trim();

    // Extract JSON - handle possible markdown code blocks
    let jsonStr = tekst;
    const codeMatch = tekst.match(/```(?:json)?\s*([\s\S]*?)```/);
    if(codeMatch) jsonStr = codeMatch[1].trim();
    const objMatch = jsonStr.match(/\{[\s\S]*?\}/);
    if(objMatch) jsonStr = objMatch[0];

    // Replace comma decimals with dots just in case
    jsonStr = jsonStr.replace(/:\s*(\d+),(\d+)/g, ': $1.$2');

    let prijzen;
    try { prijzen = JSON.parse(jsonStr); }
    catch(e) { throw new Error('Kon prijzen niet verwerken. Probeer opnieuw.'); }

    // Validate and save
    const landen = ['nl','de','be'];
    for(const l of landen){
      const p = parseFloat(prijzen[l]);
      if(isNaN(p) || p < 0.8 || p > 5) throw new Error('Onverwachte prijs voor ' + l + ': ' + prijzen[l]);
      state.prijzen[l] = Math.round(p * 1000) / 1000;
    }
    save();

    // Update velden live
    landen.forEach(l => {
      const inp = document.getElementById('prijs-'+l);
      if(inp) inp.value = fmtN(state.prijzen[l], 3).replace(',','.');
    });

    const now = new Date().toLocaleString('nl-NL');
    localStorage.setItem('prijzen_last_fetch', now);

    if(status){
      status.innerHTML = '✅ Bijgewerkt op ' + now + '<br>' +
        '🇳🇱 €' + fmtN(state.prijzen.nl,3) + ' &nbsp; ' +
        '🇩🇪 €' + fmtN(state.prijzen.de,3) + ' &nbsp; ' +
        '🇧🇪 €' + fmtN(state.prijzen.be,3);
      status.style.color = '#34d399';
    }

  } catch(e) {
    if(status){
      status.textContent = '❌ ' + e.message;
      status.style.color = '#f87171';
    }
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='🔄 Haal actuele prijzen op'; }
  }
}
